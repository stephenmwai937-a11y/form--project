<!DOCTYPE html>
<html>
<head>
  <title>Service Form</title>
</head>
<body>

  <h2>Service Request Form</h2>

  <form>

    Full Name:<br>
    <input type="text" name="fullname"><br><br>

    Email Address:<br>
    <input type="email" name="email"><br><br>

    Phone Number:<br>
    <input type="tel" name="phone"><br><br>

    Date of Birth:<br>
    <input type="date" name="dob"><br><br>

    Gender:<br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other"> Other
    <br><br>

    Services Required:<br>
    <input type="checkbox" name="service" value="Consultation"> Consultation<br>
    <input type="checkbox" name="service" value="Laboratory Test"> Laboratory Test<br>
    <input type="checkbox" name="service" value="Pharmacy"> Pharmacy<br><br>

    County of Residence:<br>
    <select name="county">
      <option>Nairobi</option>
      <option>Kiambu</option>
      <option>Machakos</option>
      <option>Kajiado</option>
    </select>
    <br><br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

  </form>

</body>
</html>
